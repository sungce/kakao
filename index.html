<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkSender Premium</title>
    <!-- 고급 폰트 및 아이콘 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" crossorigin="anonymous"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: radial-gradient(circle at top right, #f8f9fa, #e9ecef);
        }

        /* 유리질 효과 (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        }

        /* 입력창 세련된 강조 */
        .input-group input, .input-group textarea {
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: #FEE500;
            box-shadow: 0 0 0 4px rgba(254, 229, 0, 0.15);
            background: white;
        }

        /* 버튼 애니메이션 */
        .send-btn {
            background: linear-gradient(135deg, #FEE500 0%, #FCDA00 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(254, 229, 0, 0.3);
        }

        .send-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(254, 229, 0, 0.4);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        /* 부드러운 페이드인 */
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md fade-in">
        <!-- 상단 헤더 -->
        <div class="text-center mb-10">
            <div class="inline-block p-3 bg-white rounded-2xl shadow-sm mb-4">
                <i class="fa-solid fa-paper-plane text-2xl text-yellow-500"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">메시지 전송 도구<span class="text-yellow-500">카카오톡</span></h1>
                    </div>

        <!-- 메인 카드 -->
        <div class="glass-card rounded-[2.5rem] p-8 md:p-10">
            <div class="space-y-6">
                
                <!-- 제목 입력창 -->
                <div class="input-group">
                    <label class="block text-xs font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">Message Title</label>
                    <div class="relative">
                        <input type="text" id="title" placeholder="품격 있는 제목을 입력하세요" 
                            class="w-full bg-slate-50/50 rounded-2xl px-5 py-4 outline-none text-slate-700 font-medium placeholder:text-slate-300">
                    </div>
                </div>

                <!-- 내용 입력창 -->
                <div class="input-group">
                    <label class="block text-xs font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">Content</label>
                    <textarea id="desc" placeholder="전달하고자 하는 핵심 메시지를 작성하세요" rows="5"
                        class="w-full bg-slate-50/50 rounded-2xl px-5 py-4 outline-none text-slate-700 font-medium placeholder:text-slate-300 leading-relaxed"></textarea>
                </div>

                <!-- 발송 버튼 -->
                <div class="pt-4">
                    <button onclick="send()" class="send-btn w-full py-5 rounded-2xl text-slate-800 font-extrabold flex flex-col items-center justify-center leading-tight">
                        <span class="text-lg">카톡 친구 선택</span>
                        <span class="text-sm opacity-70 font-bold">(최대 10명)</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 하단 정보 -->
        <footer class="mt-10 text-center">
            <p class="text-slate-400 text-xs tracking-wide">
                &copy; 2024 TalkSender Premium. <br>
                <span class="text-slate-300 mt-2 block">Powered by Sungce GitHub</span>
            </p>
        </footer>
    </div>

    <script>
        // 카카오 초기화
        const KAKAO_KEY = '7bbaa2166711a20e94677d8ed098b216';
        const PAGE_URL = 'https://sungce.github.io/kakao/';

        if (!Kakao.isInitialized()) {
            Kakao.init(KAKAO_KEY);
        }

        function send() {
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;

            if (!title || !desc) {
                alert('내용을 입력해 주세요.');
                return;
            }

            Kakao.Share.sendDefault({
                objectType: 'text',
                text: `[${title}]\n\n${desc}`,
                link: {
                    mobileWebUrl: PAGE_URL,
                    webUrl: PAGE_URL,
                },
                buttonTitle: '메시지 확인하기',
            });
        }
    </script>
</body>
</html>
