<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkSender - Only Message</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f9fafb; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #f1f5f9;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }
        .send-btn {
            background: #FEE500;
            transition: all 0.3s ease;
        }
        .send-btn:hover {
            background: #fada00;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-sm">
        <div class="glass-card rounded-[2rem] p-8">
            <h1 class="text-xl font-extrabold text-slate-800 mb-6 text-center">메시지 전송</h1>

            <div class="space-y-4">
                <!-- 내용 입력창만 남김 -->
                <div>
                    <textarea id="desc" placeholder="전송할 내용을 입력하세요" rows="8"
                        class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 outline-none text-slate-700 font-medium placeholder:text-slate-300 focus:ring-2 focus:ring-yellow-400 transition-all"></textarea>
                </div>

                <!-- 발송 버튼 (요청하신 두 줄 스타일) -->
                <button onclick="send()" class="send-btn w-full py-5 rounded-2xl text-slate-800 font-extrabold shadow-lg">
                    <div class="text-lg">카톡 친구 선택</div>
                    <div class="text-sm opacity-60 font-bold">(최대 10명)</div>
                </button>
            </div>
        </div>

        <p class="text-center mt-8 text-slate-400 text-[11px] tracking-widest uppercase font-semibold">
            Sungce GitHub Service
        </p>
    </div>

    <script>
        // 카카오 초기화
        const KAKAO_KEY = '7bbaa2166711a20e94677d8ed098b216';
        const PAGE_URL = 'https://sungce.github.io/kakao/';

        if (!Kakao.isInitialized()) Kakao.init(KAKAO_KEY);

        function send() {
            const desc = document.getElementById('desc').value;

            if (!desc) {
                alert('전송할 내용을 입력해 주세요.');
                return;
            }

            // [제목] 등을 모두 제거하고 '내용'만 그대로 전송
            Kakao.Share.sendDefault({
                objectType: 'text',
                text: desc,
                link: {
                    mobileWebUrl: PAGE_URL,
                    webUrl: PAGE_URL,
                },
                // 버튼은 카카오 정책상 최소 1개가 필요하지만, 
                // 가장 깔끔하게 '확인'으로 설정했습니다.
                buttonTitle: '확인하기'
            });
        }
    </script>
</body>
</html>
