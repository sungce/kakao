<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkSender - 카카오톡 메시지 전송기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 카카오 SDK 로드 -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" integrity="sha384-lLeY8v6Y9UfT9A2R+fTzUu6bXKAtJmC/N4jW6Ww0uNfTzYyE6U6b+R6S1N3r0J2B" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .kakao-yellow { background-color: #FEE500; }
        .kakao-preview { background-color: #bacee0; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="max-w-md mx-auto py-10 px-4">
        <!-- 헤더 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">TalkSender 💬</h1>
            <p class="text-gray-500 mt-2">나만의 메시지 템플릿을 보내보세요</p>
        </div>

        <!-- 입력 폼 -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">제목</label>
                    <input type="text" id="title" placeholder="제목을 입력하세요" 
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-400 outline-none"
                        oninput="updatePreview()">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">내용</label>
                    <textarea id="description" placeholder="상세 내용을 입력하세요" rows="3"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-400 outline-none"
                        oninput="updatePreview()"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">이미지 URL</label>
                    <input type="text" id="imageUrl" value="https://picsum.photos/800/400"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-400 outline-none"
                        oninput="updatePreview()">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">연결 링크 (URL)</label>
                    <input type="text" id="linkUrl" value="https://www.naver.com"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-400 outline-none">
                </div>
            </div>
        </div>

        <!-- 실시간 미리보기 -->
        <div class="mb-6">
            <h2 class="text-xs font-bold text-gray-400 uppercase mb-2 ml-1">미리보기 (카카오톡 스타일)</h2>
            <div class="kakao-preview p-6 rounded-xl shadow-inner">
                <div class="bg-white rounded overflow-hidden max-w-[250px] mx-auto shadow-md">
                    <img id="prevImg" src="https://picsum.photos/800/400" class="w-full h-32 object-cover">
                    <div class="p-3">
                        <h3 id="prevTitle" class="font-bold text-sm text-gray-900 truncate">제목이 표시됩니다</h3>
                        <p id="prevDesc" class="text-xs text-gray-600 mt-1 line-clamp-2">내용이 표시됩니다.</p>
                    </div>
                    <div class="border-t border-gray-100 p-2 text-center">
                        <span class="text-[10px] text-gray-400">자세히 보기</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 전송 버튼 -->
        <button onclick="sendKakao()" class="w-full kakao-yellow hover:bg-yellow-400 text-gray-900 font-bold py-4 rounded-xl transition duration-200 shadow-md flex items-center justify-center gap-2">
            <img src="https://developers.kakao.com/assets/img/dot_l.png" class="w-5 h-5">
            카카오톡으로 공유하기
        </button>
    </div>

    <script>
        // 1. 카카오 초기화
        const KAKAO_KEY = '7bbaa2166711a20e94677d8ed098b216';
        if (!Kakao.isInitialized()) {
            Kakao.init(KAKAO_KEY);
            console.log('카카오 SDK 초기화 완료');
        }

        // 2. 실시간 미리보기 기능
        function updatePreview() {
            const title = document.getElementById('title').value || '제목이 표시됩니다';
            const desc = document.getElementById('description').value || '내용이 표시됩니다';
            const img = document.getElementById('imageUrl').value || 'https://picsum.photos/800/400';

            document.getElementById('prevTitle').innerText = title;
            document.getElementById('prevDesc').innerText = desc;
            document.getElementById('prevImg').src = img;
        }

        // 3. 메시지 전송 기능
        function sendKakao() {
            const title = document.getElementById('title').value;
            const desc = document.getElementById('description').value;
            const img = document.getElementById('imageUrl').value;
            const link = document.getElementById('linkUrl').value;

            if(!title || !desc) {
                alert('제목과 내용을 입력해주세요!');
                return;
            }

            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: title,
                    description: desc,
                    imageUrl: img,
                    link: {
                        mobileWebUrl: link,
                        webUrl: link,
                    },
                },
                buttons: [
                    {
                        title: '자세히 보기',
                        link: {
                            mobileWebUrl: link,
                            webUrl: link,
                        },
                    },
                ],
            });
        }
    </script>
</body>
</html>
