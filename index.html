<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkSender Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #f8f9fa; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }
        .send-btn {
            background: #FEE500;
            transition: all 0.3s ease;
        }
        .send-btn:hover { background: #fada00; transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-sm">
        <!-- 기본 헤더 유지 -->
        <div class="text-center mb-10">
            <div class="inline-block p-3 bg-white rounded-2xl shadow-sm mb-4">
                <i class="fa-solid fa-paper-plane text-2xl text-yellow-500"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">TalkSender <span class="text-yellow-500">Pro</span></h1>
            <p class="text-slate-400 mt-2 font-light">오직 메시지만 전송합니다</p>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8">
            <div class="space-y-6">
                <textarea id="desc" placeholder="보낼 내용을 입력하세요..." rows="10"
                    class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 outline-none text-slate-700 font-medium placeholder:text-slate-300 focus:ring-2 focus:ring-yellow-400 transition-all leading-relaxed"></textarea>

                <button onclick="send()" class="send-btn w-full py-5 rounded-2xl text-slate-800 font-extrabold shadow-md">
                    <div class="text-lg">카톡 친구 선택</div>
                    <div class="text-sm opacity-60">(최대 10명)</div>
                </button>
            </div>
        </div>
    </div>

    <script>
        const KAKAO_KEY = '7bbaa2166711a20e94677d8ed098b216';
        const PAGE_URL = 'https://sungce.github.io/kakao/'; // 카카오가 요구하는 필수 링크

        if (!Kakao.isInitialized()) Kakao.init(KAKAO_KEY);

        function send() {
            const desc = document.getElementById('desc').value;
            if (!desc) return alert('내용을 입력해주세요.');

            // 버튼(buttons) 속성을 아예 제외하여 전송
            Kakao.Share.sendDefault({
                objectType: 'text',
                text: desc,
                link: {
                    mobileWebUrl: PAGE_URL,
                    webUrl: PAGE_URL,
                }
                // buttons: [] 를 넣지 않으면 하단 버튼이 생성되지 않습니다.
            });
        }
    </script>
</body>
</html>
